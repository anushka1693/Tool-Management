<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KNAV Tool Clearance Hub</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-gray-100">

<!-- HEADER -->
<div class="bg-[#800000] text-white p-4 flex justify-between">
  <div class="font-bold text-lg">KNAV Tool Clearance Hub</div>
    <div class="text-right">
      <div><b id="userName">Loading...</b></div>
      <div class="text-sm">
        <span id="userDesignation"></span> |
        <span id="userPractice"></span> |
        <span id="userRole"></span>
      </div>
      <button onclick="logout()" class="text-xs underline">Logout</button>
    </div>
</div>

<div class="flex">

<!-- SIDEBAR -->
<div class="w-60 bg-white p-4 shadow h-screen">
  <button id="btnAddTool" onclick="addTool()" class="btn-primary mb-4">
    + Add New Tool
  </button>
  <div>Dashboard</div>
</div>

<!-- MAIN -->
<div class="flex-1 p-6">

<h2 class="text-xl font-bold mb-3">What are you looking for?</h2>

<div class="flex gap-2 mb-4">
  <select id="mode" class="border p-2 flex-1">
    <option value="new">New Tool</option>
    <option value="existing">Existing Tool</option>
    <option value="ai">AI Tool</option>
  </select>

  <button onclick="addTool()" class="btn-primary px-4">
    Start Request
  </button>
</div>

<!-- FILTER -->
<div class="mb-3 flex gap-2">
<button onclick="setFilter('all')" class="filter-btn">All</button>
<button onclick="setFilter('progress')" class="filter-btn bg-blue-300">In Progress</button>
<button onclick="setFilter('completed')" class="filter-btn bg-green-300">Completed</button>
<button onclick="setFilter('new')" class="filter-btn bg-gray-400">Not Started</button>
</div>

<table class="w-full bg-white rounded shadow">
<thead>
<tr class="border-b">
<th class="p-2 text-left">Tool</th>
<th class="p-2 text-left">Type</th>
<th class="p-2 text-left">Step</th>
<th class="p-2 text-left">Progress</th>
<th class="p-2 text-left">%</th>
<th class="p-2 text-left">Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>
</div>

<!-- MODAL -->
<div id="modal" class="hidden modal-bg">
<div class="modal-box">

<div class="modal-left" id="steps"></div>
<div class="modal-center" id="center"></div>

<div class="modal-right">
<button onclick="renderDocs()" class="mb-2 bg-gray-200 px-2">Documents</button>
<div id="docs"></div>

<h3 class="mt-4 font-bold">Audit</h3>
<div id="audit"></div>
</div>

<button onclick="closeModal()" class="modal-close">Close</button>

</div>
</div>

<!-- PREVIEW -->
<div id="preview" class="hidden modal-bg">
<div class="preview-box">
<h3 id="previewTitle"></h3>
<div class="border p-10 text-center">Document Preview</div>
<button onclick="closePreview()" class="btn-danger mt-2">Close</button>
</div>
</div>

<!-- JS FILES -->
<script src="js/app.js"></script>
<script src="js/modal.js"></script>
<script src="js/steps.js"></script>
<script src="js/documents.js"></script>
<script src="js/excel.js"></script>
<script src="js/auth.js"></script>

<script>
  window.onload = function () {
    loadUser();
  };
</script>
  
</body>
</html>

<script>
  window.onload = loadUser;
</script>
