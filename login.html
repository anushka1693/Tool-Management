<!DOCTYPE html>
<html>
<head>
<title>KNAV Tool Clearance Hub</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f3f4f6;
font-family:Cambria;
}

.login-card{
width:380px;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
text-align:center;
}

.divider{
margin:22px 0;
border-top:1px solid #f0f0f0;
}

.logo{
width:140px;
margin-bottom:15px;
}

.subtitle{
color:#555;
margin-bottom:30px;
font-size:16px;
}

.login-btn{
background:#8B0015;
color:white;
border:none;
padding:10px 22px;
border-radius:6px;
font-size:14px;
cursor:pointer;
display:inline-block;
}

.login-btn:hover{
background:#6f0011;
}

.assist{
margin-top:25px;
font-size:13px;
color:#666;
}

.assist a{
color:#0078D4;   /* blue */
text-decoration:none;
font-weight:500;
}

.assist a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="login-card">

<img src="/css/knav-logo.png" class="logo">

<div class="subtitle">Sign in to begin.</div>

<button class="login-btn" onclick="login()">
Login with Microsoft SSO
</button>

<div class="assist">

<div class="divider"></div>

Need help? Contact <br>

<a href="mailto:digital.transformation@knavus.com">
digital.transformation@knavus.com
</a>

</div>

</div>

<script>
function login(){
window.location.href="/.auth/login/aad?post_login_redirect_uri=/index.html";
}
</script>

</body>
</html>
